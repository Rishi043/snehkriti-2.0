<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed! | SNEHKRITI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Homemade+Apple&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/style.css">
</head>
<body class="bg-[#f8f1f0] text-[#5e503f] font-['Playfair_Display']">

  <header class="relative overflow-hidden">
    <div class="absolute inset-0 bg-[#f8edeb] opacity-60"></div>
    <div class="relative z-10 container mx-auto px-4 py-8 flex flex-col items-center">
      <h1 class="text-5xl md:text-7xl font-bold text-[#d4a373] mb-4 flex items-center justify-center gap-2">
        <span class="handwritten" style="font-family:'Hind',sans-serif;font-weight:600;color:#a17852;">स्नेह</span>
        <span class="letter italic" style="font-family:'Homemade Apple',cursive;transform:rotate(-2deg);color:#d4a373;">Kriti</span>
      </h1>
      <p class="text-xl md:text-2xl handwritten text-[#6c757d] italic">Printed with Love. Felt like a Hug.</p>
    </div>
  </header>

  <nav class="container mx-auto px-4 py-6 flex justify-center sticky top-0 bg-[#f8f1f0] bg-opacity-95 z-50 border-b-2 border-[#d4a373] border-opacity-30 backdrop-filter backdrop-blur-lg">
    <ul class="flex flex-wrap justify-center gap-x-6 gap-y-2 handwritten text-xl">
      <li><a href="index.html" class="hover:text-[#d4a373] transition-all duration-300">Home</a></li>
      <li><a href="products.html" class="hover:text-[#d4a373] transition-all duration-300">Shop All</a></li>
      <li class="relative">
        <a href="cart.html" class="hover:text-[#d4a373] transition-all duration-300 relative">
          Cart
          <span id="cart-count-badge" class="absolute -top-2 -right-4 bg-[#d4a373] text-white text-xs rounded-full w-5 h-5 flex items-center justify-center handwritten">0</span>
        </a>
      </li>
    </ul>
  </nav>

  <section class="py-12 px-4">
    <div class="container mx-auto max-w-5xl" id="confirmed-root">
      <div class="text-center py-20">
        <div class="skeleton h-16 w-16 rounded-full mx-auto mb-4"></div>
        <div class="skeleton h-10 w-64 rounded-full mx-auto mb-4"></div>
        <div class="skeleton h-6 w-96 rounded-full mx-auto"></div>
      </div>
    </div>
  </section>

  <a href="cart.html" class="fixed bottom-6 right-6 z-50 flex flex-col items-center gap-0.5 group" style="text-decoration:none;">
    <div style="background:linear-gradient(135deg,#d4a373,#b08968);color:white;width:56px;height:56px;border-radius:50%;box-shadow:0 8px 24px rgba(212,163,115,0.5);display:flex;align-items:center;justify-content:center;font-size:1.5rem;transition:transform 0.3s;position:relative;" class="group-hover:scale-110">
      🛍️
      <span id="cart-count-badge-float" style="position:absolute;top:-4px;right:-4px;background:#e91e63;color:white;font-size:0.65rem;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;font-weight:700;">0</span>
    </div>
    <span style="font-family:'Inter',sans-serif;font-size:0.6rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#b08968;background:white;padding:1px 6px;border-radius:20px;box-shadow:0 2px 8px rgba(0,0,0,0.1);">Cart</span>
  </a>

  <footer class="py-8 px-4 text-center watercolor-bg mt-12">
    <p class="handwritten text-xl text-[#d4a373]">Made with love & ink-stained hands 🌸</p>
    <p class="handwritten text-lg text-[#6c757d] mt-1">© 2025 SNEHKRITI · <a href="https://www.instagram.com/snehkriti.in/" target="_blank" class="hover:text-[#d4a373]">@snehkriti.in</a></p>
  </footer>

  <script type="module" src="src/orderConfirmed.js"></script>
</body>
</html>
