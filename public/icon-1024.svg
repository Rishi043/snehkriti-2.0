<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background: brand cream gradient -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%"   stop-color="#fdf6f0"/>
      <stop offset="60%"  stop-color="#f8edeb"/>
      <stop offset="100%" stop-color="#f0e0d6"/>
    </radialGradient>
    <!-- Subtle warm glow behind text -->
    <radialGradient id="glow" cx="50%" cy="52%" r="38%">
      <stop offset="0%"   stop-color="#d4a373" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#d4a373" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="1024" height="1024" rx="180" ry="180" fill="url(#bg)"/>

  <!-- Decorative ring -->
  <circle cx="512" cy="512" r="460" fill="none" stroke="#d4a373" stroke-width="5" opacity="0.18"/>

  <!-- Warm glow blob -->
  <ellipse cx="512" cy="530" rx="340" ry="260" fill="url(#glow)"/>

  <!-- Decorative corner dots -->
  <circle cx="200" cy="200" r="8" fill="#d4a373" opacity="0.2"/>
  <circle cx="824" cy="200" r="8" fill="#d4a373" opacity="0.2"/>
  <circle cx="200" cy="824" r="8" fill="#d4a373" opacity="0.2"/>
  <circle cx="824" cy="824" r="8" fill="#d4a373" opacity="0.2"/>

  <!-- "स्नेह" — Hindi, bold, muted brown, matching home page Hind font style -->
  <text
    x="512"
    y="430"
    text-anchor="middle"
    dominant-baseline="auto"
    font-family="'Hind', 'Noto Sans Devanagari', 'Arial Unicode MS', sans-serif"
    font-weight="600"
    font-size="268"
    fill="#a17852"
    letter-spacing="-2"
  >स्नेह</text>

  <!-- "Kriti" — italic, gold, slight rotation, matching Homemade Apple style -->
  <text
    x="512"
    y="650"
    text-anchor="middle"
    dominant-baseline="auto"
    font-family="'Georgia', 'Palatino Linotype', serif"
    font-style="italic"
    font-weight="400"
    font-size="210"
    fill="#d4a373"
    transform="rotate(-2, 512, 650)"
  >Kriti</text>

  <!-- Thin divider line -->
  <line x1="280" y1="690" x2="744" y2="690" stroke="#d4a373" stroke-width="1.5" opacity="0.35"/>

  <!-- "CUSTOMISED CLOTHES" — tiny spaced caps, muted brown -->
  <text
    x="512"
    y="760"
    text-anchor="middle"
    dominant-baseline="auto"
    font-family="'Montserrat', 'Arial', sans-serif"
    font-weight="300"
    font-size="52"
    fill="#a17852"
    letter-spacing="14"
    opacity="0.75"
  >CUSTOMISED CLOTHES</text>
</svg>
