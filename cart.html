<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart | SNEHKRITI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Homemade+Apple&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/style.css">
</head>
<body class="bg-[#f8f1f0] text-[#5e503f] font-['Playfair_Display']">

      <h1 class="text-5xl md:text-7xl font-bold text-[#d4a373] mb-4 flex items-center justify-center gap-2">
        <span class="handwritten" style="font-family:'Hind',sans-serif;font-weight:600;color:#a17852;">स्नेह</span>
        <span class="letter italic" style="font-family:'Homemade Apple',cursive;transform:rotate(-2deg);color:#d4a373;">Kriti</span>
      </h1>
      <p class="text-xl md:text-2xl handwritten text-[#6c757d] italic">Printed with Love. Felt like a Hug.</p>
    </div>
  </header>

  <nav class="container mx-auto px-4 py-6 flex justify-center sticky top-0 bg-[#f8f1f0] bg-opacity-95 z-50 border-b-2 border-[#d4a373] border-opacity-30 backdrop-filter backdrop-blur-lg">
    <ul class="flex flex-wrap justify-center gap-x-6 gap-y-2 handwritten text-xl">
      <li><a href="index.html#home" class="hover:text-[#d4a373] transition-all duration-300">Home</a></li>
      <li><a href="index.html#gallery" class="hover:text-[#d4a373] transition-all duration-300">Gallery</a></li>

      <li><a href="index.html#about" class="hover:text-[#d4a373] transition-all duration-300">Our Story</a></li>
      <li><a href="my-orders.html" class="hover:text-[#d4a373] transition-all duration-300">My Orders</a></li>
      <li class="relative">
        <a href="cart.html" class="text-[#d4a373] transition-all duration-300 relative">
          Cart
          <span id="cart-count-badge" class="absolute -top-2 -right-4 bg-[#d4a373] text-white text-xs rounded-full w-5 h-5 flex items-center justify-center handwritten">0</span>
        </a>
      </li>
    </ul>
  </nav>

  <section class="py-12 px-4">
    <div class="container mx-auto max-w-5xl">
      <h2 class="text-4xl handwritten font-bold text-[#d4a373] mb-8 text-center">Your Cart 🛍️</h2>
      <div id="cart-root"></div>
    </div>
  </section>

  <a href="cart.html" class="fixed bottom-6 right-6 z-50 group" style="text-decoration:none;">
    <div style="background:linear-gradient(135deg,#d4a373,#b08968);width:56px;height:56px;border-radius:50%;box-shadow:0 6px 20px rgba(212,163,115,0.55);display:flex;align-items:center;justify-content:center;transition:transform 0.3s;position:relative;" class="group-hover:scale-110">
      <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.99 1.61h9.72a2 2 0 001.99-1.61L23 6H6"/></svg>

    <p class="handwritten text-lg text-[#6c757d] mt-1">© 2025 SNEHKRITI · <a href="https://www.instagram.com/snehkriti.in/" target="_blank" class="hover:text-[#d4a373]">@snehkriti.in</a></p>
  </footer>

  <script type="module" src="src/cartPage.js"></script>

</html>
