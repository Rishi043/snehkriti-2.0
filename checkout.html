<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | SNEHKRITI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Homemade+Apple&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/style.css">
  <style>
    .checkout-label { font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #8a7060; margin-bottom: 0.4rem; display: flex; align-items: center; gap: 0.4rem; }
    .checkout-input { font-family: 'Playfair Display', serif; font-size: 1rem; color: #3d2b1f; background: #fff; border: 1.5px solid #e2d0c0; border-radius: 10px; padding: 0.7rem 1rem; width: 100%; transition: border-color 0.2s, box-shadow 0.2s; outline: none; }
    .checkout-input:focus { border-color: #d4a373; box-shadow: 0 0 0 3px rgba(212,163,115,0.15); }
    .checkout-input::placeholder { color: #c4b0a0; font-style: italic; font-size: 0.9rem; }
    .checkout-field { margin-bottom: 1.1rem; }
  </style>
</head>
<body class="bg-[#f8f1f0] text-[#5e503f] font-['Playfair_Display']">

  <header class="relative overflow-hidden">
    <div class="absolute inset-0 bg-[#f8edeb] opacity-60"></div>
    <div class="relative z-10 container mx-auto px-4 py-8 flex flex-col items-center">
      <h1 class="text-5xl md:text-7xl font-bold text-[#d4a373] mb-4 flex items-center justify-center gap-2">
        <span class="handwritten" style="font-family:'Hind',sans-serif;font-weight:600;color:#a17852;">स्नेह</span>
        <span class="letter italic" style="font-family:'Homemade Apple',cursive;transform:rotate(-2deg);color:#d4a373;">Kriti</span>
      </h1>
      <p class="text-xl md:text-2xl handwritten text-[#6c757d] italic">Printed with Love. Felt like a Hug.</p>
    </div>
  </header>

  <nav class="container mx-auto px-4 py-6 flex justify-center sticky top-0 bg-[#f8f1f0] bg-opacity-95 z-50 border-b-2 border-[#d4a373] border-opacity-30 backdrop-filter backdrop-blur-lg">
    <ul class="flex flex-wrap justify-center gap-x-6 gap-y-2 handwritten text-xl">
      <li><a href="index.html#home" class="hover:text-[#d4a373] transition-all duration-300">Home</a></li>
      <li><a href="products.html" class="hover:text-[#d4a373] transition-all duration-300">Shop All</a></li>
      <li class="relative">
        <a href="cart.html" class="hover:text-[#d4a373] transition-all duration-300 relative">
          Cart
          <span id="cart-count-badge" class="absolute -top-2 -right-4 bg-[#d4a373] text-white text-xs rounded-full w-5 h-5 flex items-center justify-center handwritten">0</span>
        </a>
      </li>
    </ul>
  </nav>

  <section class="py-12 px-4">
    <div class="container mx-auto max-w-5xl">
      <h2 class="text-4xl handwritten font-bold text-center mb-2 gradient-text">Almost There! 🌸</h2>
      <p class="handwritten text-xl text-[#6c757d] italic text-center mb-10">Just a few details and your piece is on its way ✨</p>

      <div class="grid md:grid-cols-3 gap-8">
        <div class="md:col-span-2">
          <form id="checkout-form" class="bg-white rounded-2xl p-6 shadow-sm" style="border:1px solid rgba(212,163,115,0.2);" novalidate>

            <div class="checkout-field">
              <label class="checkout-label" for="name">Full Name <span style="color:#e91e63">*</span></label>
              <input id="name" type="text" class="checkout-input" placeholder="e.g. Priya Sharma">
            </div>

            <div class="checkout-field">
              <label class="checkout-label" for="phone">Phone Number <span style="color:#e91e63">*</span></label>
              <div class="flex items-center gap-2">
                <span style="font-family:'Inter',sans-serif;font-size:0.95rem;font-weight:600;color:#5e503f;background:#f8edeb;padding:0.7rem 0.8rem;border-radius:10px;border:1.5px solid #e2d0c0;">+91</span>
                <input id="phone" type="tel" class="checkout-input" placeholder="10-digit mobile number">
              </div>
            </div>

            <div class="checkout-field">
              <label class="checkout-label" for="email">Email Address <span style="color:#a0a0a0;font-weight:400;text-transform:none;letter-spacing:0;">(optional)</span></label>
              <input id="email" type="email" class="checkout-input" placeholder="yourname@email.com">
            </div>

            <div class="checkout-field">
              <label class="checkout-label" for="address1">Address Line 1 <span style="color:#e91e63">*</span></label>
              <input id="address1" type="text" class="checkout-input" placeholder="House No. / Flat / Building / Street">
            </div>

            <div class="checkout-field">
              <label class="checkout-label" for="address2">Address Line 2 <span style="color:#a0a0a0;font-weight:400;text-transform:none;letter-spacing:0;">(optional)</span></label>
              <input id="address2" type="text" class="checkout-input" placeholder="Area / Locality / Landmark">
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div class="checkout-field">
                <label class="checkout-label" for="city">City <span style="color:#e91e63">*</span></label>
                <input id="city" type="text" class="checkout-input" placeholder="e.g. Bhopal">
              </div>
              <div class="checkout-field">
                <label class="checkout-label" for="state">State <span style="color:#e91e63">*</span></label>
                <input id="state" type="text" class="checkout-input" placeholder="e.g. Madhya Pradesh">
              </div>
            </div>

            <div class="checkout-field">
              <label class="checkout-label" for="pincode">Pincode <span style="color:#e91e63">*</span></label>
              <input id="pincode" type="number" class="checkout-input" placeholder="6-digit pincode">
            </div>

            <div class="checkout-field">
              <label class="checkout-label" for="notes">Order Notes <span style="color:#a0a0a0;font-weight:400;text-transform:none;letter-spacing:0;">(optional)</span></label>
              <textarea id="notes" class="checkout-input" rows="3" placeholder="Any special requests — gift wrapping, colour preferences, custom message..."></textarea>
            </div>

            <button type="submit" class="submit-btn w-full mt-2" style="font-family:'Playfair Display',serif;font-size:1.2rem;letter-spacing:0.03em;">Place Order 💛</button>
          </form>
        </div>

        <div class="summary-card artistic-border self-start sticky top-24">
          <h3 class="handwritten text-2xl font-bold text-[#d4a373] mb-4">Order Summary</h3>
          <div id="order-summary"></div>
        </div>
      </div>
    </div>
  </section>

  <a href="cart.html" class="fixed bottom-6 right-6 z-50 group" style="text-decoration:none;">
    <div style="background:linear-gradient(135deg,#d4a373,#b08968);width:56px;height:56px;border-radius:50%;box-shadow:0 6px 20px rgba(212,163,115,0.55);display:flex;align-items:center;justify-content:center;transition:transform 0.3s;position:relative;" class="group-hover:scale-110">
      <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.99 1.61h9.72a2 2 0 001.99-1.61L23 6H6"/></svg>
      <span id="cart-count-badge-float" style="position:absolute;top:-4px;right:-4px;background:#e91e63;color:white;font-size:0.6rem;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-family:Inter,sans-serif;font-weight:700;">0</span>
    </div>
  </a>

  <footer class="py-8 px-4 text-center watercolor-bg mt-12">
    <p class="handwritten text-xl text-[#d4a373]">Made with love & ink-stained hands 🌸</p>
    <p class="handwritten text-lg text-[#6c757d] mt-1">© 2025 SNEHKRITI · <a href="https://www.instagram.com/snehkriti.in/" target="_blank" class="hover:text-[#d4a373]">@snehkriti.in</a></p>
  </footer>

  <script type="module" src="src/checkoutPage.js"></script>
</body>
</html>
