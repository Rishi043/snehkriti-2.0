<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | SNEHKRITI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Homemade+Apple&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/style.css">
</head>
<body class="bg-[#f8f1f0] text-[#5e503f] font-['Playfair_Display']">

  <header class="relative overflow-hidden">
    <div class="absolute inset-0 bg-[#f8edeb] opacity-60"></div>
    <div class="relative z-10 container mx-auto px-4 py-8 flex flex-col items-center">
      <h1 class="text-5xl md:text-7xl font-bold text-[#d4a373] mb-4 flex items-center justify-center gap-2">
        <span class="handwritten" style="font-family:'Hind',sans-serif;font-weight:600;color:#a17852;">स्नेह</span>
        <span class="letter italic" style="font-family:'Homemade Apple',cursive;transform:rotate(-2deg);color:#d4a373;">Kriti</span>
      </h1>
      <p class="text-xl md:text-2xl handwritten text-[#6c757d] italic">Printed with Love. Felt like a Hug.</p>
    </div>
  </header>

  <nav class="container mx-auto px-4 py-6 flex justify-center sticky top-0 bg-[#f8f1f0] bg-opacity-95 z-50 border-b-2 border-[#d4a373] border-opacity-30 backdrop-filter backdrop-blur-lg">
    <ul class="flex flex-wrap justify-center gap-x-6 gap-y-2 handwritten text-xl">
      <li><a href="index.html#home" class="hover:text-[#d4a373] transition-all duration-300">Home</a></li>
      <li><a href="products.html" class="hover:text-[#d4a373] transition-all duration-300">Shop All</a></li>
      <li class="relative">
        <a href="cart.html" class="hover:text-[#d4a373] transition-all duration-300 relative">
          Cart
          <span id="cart-count-badge" class="absolute -top-2 -right-4 bg-[#d4a373] text-white text-xs rounded-full w-5 h-5 flex items-center justify-center handwritten">0</span>
        </a>
      </li>
    </ul>
  </nav>

  <section class="py-12 px-4">
    <div class="container mx-auto max-w-5xl">
      <h2 class="text-4xl handwritten font-bold text-center mb-2 gradient-text">Almost There! 🌸</h2>
      <p class="handwritten text-xl text-[#6c757d] italic text-center mb-10">Just a few details and your piece is on its way ✨</p>

      <div class="grid md:grid-cols-3 gap-8">
        <div class="md:col-span-2">
          <form id="checkout-form" class="space-y-4" novalidate>

            <div class="form-field">
              <label for="name"><i>👤</i> Full Name *</label>
              <input id="name" type="text" class="form-input" placeholder="Your beautiful name">
            </div>

            <div class="form-field">
              <label for="phone"><i>📱</i> Phone Number *</label>
              <div class="flex items-center gap-2">
                <span class="handwritten text-lg text-[#5e503f] font-bold">+91</span>
                <input id="phone" type="tel" class="form-input" placeholder="10-digit mobile number">
              </div>
            </div>

            <div class="form-field">
              <label for="email"><i>📧</i> Email (optional)</label>
              <input id="email" type="email" class="form-input" placeholder="For digital receipts (optional)">
            </div>

            <div class="form-field">
              <label for="address1"><i>🏠</i> Address Line 1 *</label>
              <input id="address1" type="text" class="form-input" placeholder="House / Flat / Street">
            </div>

            <div class="form-field">
              <label for="address2"><i>📍</i> Address Line 2</label>
              <input id="address2" type="text" class="form-input" placeholder="Area / Locality (optional)">
            </div>

            <div class="grid grid-cols-2 gap-4">
              <div class="form-field">
                <label for="city"><i>🏙️</i> City *</label>
                <input id="city" type="text" class="form-input" placeholder="Your city">
              </div>
              <div class="form-field">
                <label for="state"><i>🗺️</i> State *</label>
                <input id="state" type="text" class="form-input" placeholder="Your state">
              </div>
            </div>

            <div class="form-field">
              <label for="pincode"><i>📮</i> Pincode *</label>
              <input id="pincode" type="number" class="form-input" placeholder="6-digit pincode">
            </div>

            <div class="form-field">
              <label for="notes"><i>💬</i> Order Notes</label>
              <textarea id="notes" class="form-input" rows="3" placeholder="Any special requests? Custom sizes, gift wrapping, colour preferences..."></textarea>
            </div>

            <button type="submit" class="submit-btn handwritten text-2xl px-8 py-4 rounded-full w-full">Place Order 💛</button>
          </form>
        </div>

        <div class="summary-card artistic-border self-start sticky top-24">
          <h3 class="handwritten text-2xl font-bold text-[#d4a373] mb-4">Order Summary</h3>
          <div id="order-summary"></div>
        </div>
      </div>
    </div>
  </section>

  <a href="cart.html" class="fixed bottom-6 right-6 z-50 bg-[#d4a373] text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-2xl hover:bg-[#b08968] transition-all hover:scale-110">
    🛍️
    <span id="cart-count-badge-float" class="absolute -top-1 -right-1 bg-[#e91e63] text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">0</span>
  </a>

  <footer class="py-8 px-4 text-center watercolor-bg mt-12">
    <p class="handwritten text-xl text-[#d4a373]">Made with love & ink-stained hands 🌸</p>
    <p class="handwritten text-lg text-[#6c757d] mt-1">© 2025 SNEHKRITI · <a href="https://www.instagram.com/snehkriti.in/" target="_blank" class="hover:text-[#d4a373]">@snehkriti.in</a></p>
  </footer>

  <script type="module" src="src/checkoutPage.js"></script>
</body>
</html>
